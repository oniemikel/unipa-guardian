name: Deploy Update Metadata
on:
  push:
    branches: [ main ]
    paths: [ 'manifest.json' ]
  workflow_dispatch: # 手動実行も可能にしておくとテストが楽です

permissions:
  contents: read
  pages: write
  id-token: write

# 同時に複数のワークフローが走った際、古い方をキャンセルして競合を防ぐ
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Create Metadata
        run: |
          VERSION=$(jq -r '.version' manifest.json)
          mkdir -p public
          echo "{
            \"version\": \"$VERSION\",
            \"release_url\": \"https://github.com/${{ github.repository }}/releases/latest\",
            \"message\": \"最新版（v$VERSION）が公開されました。\"
          }" > public/update.json

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'public/'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
