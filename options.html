<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>UNIPA Guardian Settings</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --primary: #2563eb;
      --bg: #f8fafc;
      --text: #1e293b;
      --border: #e2e8f0;
    }

    body {
      width: 320px;
      margin: 0;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg);
      color: var(--text);
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .header-icon {
      font-size: 20px;
    }

    .header h1 {
      font-size: 16px;
      margin: 0;
      font-weight: 700;
    }

    .card {
      background: white;
      padding: 16px;
      border-radius: 12px;
      border: 1px solid var(--border);
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
    }

    .card + .card {
      margin-top: 12px;
    }

    .setting-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .setting-label {
      font-size: 13px;
      font-weight: 500;
    }

    .section-title {
      margin: 0 0 12px;
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
    }

    .action-list {
      display: grid;
      gap: 8px;
    }

    .action-btn {
      border: none;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease, background-color 0.15s ease;
      text-align: left;
    }

    .action-btn:hover {
      transform: translateY(-1px);
      opacity: 0.95;
    }

    .action-btn:active {
      transform: translateY(0);
    }

    .danger-btn {
      background: #fff5f5;
      color: #c53030;
      border: 1px solid #fed7d7;
    }

    .danger-btn:hover {
      background: #fed7d7;
    }

    .danger-strong-btn {
      background: #fee2e2;
      color: #9b1c1c;
      border: 1px solid #fca5a5;
    }

    .danger-strong-btn:hover {
      background: #fecaca;
    }

    .action-note {
      margin: 8px 0 0;
      font-size: 11px;
      line-height: 1.5;
      color: #64748b;
    }

    /* モダンなスイッチUI */
    .switch {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 22px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #cbd5e1;
      transition: .3s;
      border-radius: 34px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .3s;
      border-radius: 50%;
    }

    input:checked+.slider {
      background-color: var(--primary);
    }

    input:checked+.slider:before {
      transform: translateX(18px);
    }

    .footer {
      margin-top: 20px;
      display: flex;
      justify-content: flex-end;
    }

    .save-btn {
      background-color: var(--primary);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .save-btn:hover {
      opacity: 0.9;
    }

    .version {
      font-size: 10px;
      color: #94a3b8;
      text-align: center;
      margin-top: 15px;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.45);
      z-index: 50;
    }

    .modal {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      z-index: 60;
      padding: 20px;
    }

    .modal[hidden],
    .modal-backdrop[hidden] {
      display: none;
    }

    .modal-card {
      width: min(92vw, 420px);
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 24px 80px rgba(15, 23, 42, 0.28);
      border: 1px solid rgba(148, 163, 184, 0.25);
      padding: 20px;
    }

    .modal-title {
      margin: 0 0 10px;
      font-size: 16px;
      line-height: 1.4;
    }

    .modal-message {
      margin: 0;
      font-size: 13px;
      line-height: 1.7;
      color: #475569;
      white-space: pre-wrap;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 18px;
    }

    .modal-btn {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    .modal-btn-secondary {
      background: #e2e8f0;
      color: #334155;
    }

    .modal-btn-primary {
      background: #dc2626;
      color: #fff;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%);
      z-index: 70;
      background: #1e293b;
      color: #fff;
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 12px;
      box-shadow: 0 12px 32px rgba(15, 23, 42, 0.25);
    }
  </style>
</head>

<body>
  <div class="header">
    <span class="header-icon">🛡️</span>
    <h1>UNIPA Guardian</h1>
  </div>

  <div class="card">
    <div class="section-title">設定</div>
    <div class="setting-item">
      <label class="setting-label" for="showStatus">セッションモニターを表示</label>
      <label class="switch">
        <input type="checkbox" id="showStatus">
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="card">
    <div class="section-title">バックアップデータ削除</div>
    <div class="action-list">
      <button id="deleteTextBackups" class="action-btn danger-btn">📝 バックアップ済みのテキストデータを削除</button>
      <button id="deleteFileBackups" class="action-btn danger-btn">📎 バックアップ済みのファイルデータを削除</button>
      <button id="deleteAllBackups" class="action-btn danger-strong-btn">🧹 バックアップ済みの全データを削除</button>
    </div>
    <p class="action-note">
      ここで削除できるのは、拡張機能が保存したローカルバックアップです。UNIPA 本体のデータは削除されません。
    </p>
  </div>

  <div class="footer">
    <button id="save" class="save-btn">設定を保存</button>
  </div>

  <div class="version" id="versionLabel"></div>

  <div id="modalBackdrop" class="modal-backdrop" hidden></div>
  <div id="modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" hidden>
    <div class="modal-card">
      <h2 id="modalTitle" class="modal-title"></h2>
      <p id="modalMessage" class="modal-message"></p>
      <div class="modal-actions">
        <button id="modalCancel" type="button" class="modal-btn modal-btn-secondary">キャンセル</button>
        <button id="modalConfirm" type="button" class="modal-btn modal-btn-primary">OK</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast" hidden></div>

  <script src="options.js"></script>
</body>

</html>
