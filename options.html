<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>UNIPA Guardian Settings</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --primary: #2563eb;
      --bg: #f8fafc;
      --text: #1e293b;
      --border: #e2e8f0;
    }

    body {
      width: 320px;
      margin: 0;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg);
      color: var(--text);
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .header-icon {
      font-size: 20px;
    }

    .header h1 {
      font-size: 16px;
      margin: 0;
      font-weight: 700;
    }

    .card {
      background: white;
      padding: 16px;
      border-radius: 12px;
      border: 1px solid var(--border);
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
    }

    .setting-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .setting-label {
      font-size: 13px;
      font-weight: 500;
    }

    /* モダンなスイッチUI */
    .switch {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 22px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #cbd5e1;
      transition: .3s;
      border-radius: 34px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .3s;
      border-radius: 50%;
    }

    input:checked+.slider {
      background-color: var(--primary);
    }

    input:checked+.slider:before {
      transform: translateX(18px);
    }

    .footer {
      margin-top: 20px;
      display: flex;
      justify-content: flex-end;
    }

    .save-btn {
      background-color: var(--primary);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .save-btn:hover {
      opacity: 0.9;
    }

    .version {
      font-size: 10px;
      color: #94a3b8;
      text-align: center;
      margin-top: 15px;
    }
  </style>
</head>

<body>
  <div class="header">
    <span class="header-icon">🛡️</span>
    <h1>UNIPA Guardian</h1>
  </div>

  <div class="card">
    <div class="setting-item">
      <label class="setting-label" for="showStatus">セッションモニターを表示</label>
      <label class="switch">
        <input type="checkbox" id="showStatus">
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="footer">
    <button id="save" class="save-btn">設定を保存</button>
  </div>

  <div class="version" id="versionLabel"></div>

  <script src="options.js"></script>
</body>

</html>
