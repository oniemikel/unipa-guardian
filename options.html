<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>UNIPA Guardian Settings</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --primary: #2563eb;
      --bg: #f8fafc;
      --text: #1e293b;
      --border: #e2e8f0;
    }

    body {
      width: 320px;
      margin: 0;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg);
      color: var(--text);
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .header-icon {
      font-size: 20px;
    }

    .header h1 {
      font-size: 16px;
      margin: 0;
      font-weight: 700;
    }

    .card {
      background: white;
      padding: 16px;
      border-radius: 12px;
      border: 1px solid var(--border);
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
    }

    .update-banner {
      display: none;
      margin-bottom: 12px;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid rgba(37, 99, 235, 0.16);
      background: linear-gradient(135deg, #eff6ff 0%, #f8fafc 100%);
      box-shadow: 0 8px 24px rgba(37, 99, 235, 0.08);
    }

    .update-banner.is-visible {
      display: block;
    }

    .update-banner__header {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .update-banner__icon {
      flex: 0 0 auto;
      width: 32px;
      height: 32px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
    }

    .update-banner__body {
      min-width: 0;
      flex: 1 1 auto;
      display: grid;
      gap: 6px;
    }

    .update-banner__title {
      margin: 0;
      font-size: 14px;
      font-weight: 700;
      color: #0f172a;
      line-height: 1.4;
    }

    .update-banner__message {
      margin: 0;
      font-size: 12px;
      line-height: 1.6;
      color: #334155;
      word-break: break-word;
    }

    .update-banner__actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 4px;
    }

    .update-banner__button {
      appearance: none;
      border: 0;
      border-radius: 10px;
      padding: 9px 12px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease, background-color 0.15s ease;
    }

    .update-banner__button:hover {
      transform: translateY(-1px);
      opacity: 0.96;
    }

    .update-banner__button:active {
      transform: translateY(0);
    }

    .update-banner__button--primary {
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: #fff;
    }

    .update-banner__button--secondary {
      background: #fff;
      color: #0f172a;
      border: 1px solid #cbd5e1;
    }

    .card + .card {
      margin-top: 12px;
    }

    .setting-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .setting-item--stacked {
      flex-direction: column;
      align-items: stretch;
      gap: 10px;
    }

    .setting-label {
      font-size: 13px;
      font-weight: 500;
    }

    .setting-help {
      margin: 4px 0 0;
      font-size: 11px;
      line-height: 1.5;
      color: #64748b;
    }

    .preset-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .preset-btn {
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s ease, border-color 0.15s ease, background-color 0.15s ease;
    }

    .preset-btn:hover {
      transform: translateY(-1px);
      border-color: var(--primary);
    }

    .preset-btn.active {
      background: #eff6ff;
      border-color: var(--primary);
      color: #1d4ed8;
    }

    .customize-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field label {
      font-size: 11px;
      font-weight: 600;
      color: #334155;
    }

    .field input,
    .field select {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 12px;
      background: #fff;
      color: var(--text);
    }

    .field input[type="color"] {
      padding: 4px;
      height: 36px;
    }

    .field input[type="range"] {
      padding: 0;
    }

    .field-inline {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .field-value {
      font-size: 11px;
      color: #475569;
      min-width: 36px;
      text-align: right;
    }

    .span-2 {
      grid-column: span 2;
    }

    .mt-14 {
      margin-top: 14px;
    }

    .preview-wrap {
      display: grid;
      gap: 10px;
    }

    .preview-box {
      position: relative;
      min-height: 120px;
      border: 1px dashed #cbd5e1;
      border-radius: 14px;
      background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 100%);
      overflow: hidden;
    }

    .preview-monitor {
      position: absolute;
      right: 12px;
      bottom: 12px;
      padding: 12px 14px;
      font-family: 'Courier New', monospace;
      z-index: 1;
      pointer-events: none;
    }

    .preview-monitor .preview-label {
      display: block;
      font-size: 10px;
      opacity: 0.75;
      margin-bottom: 3px;
    }

    .preview-monitor .preview-time {
      display: block;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.2;
    }

    .section-title {
      margin: 0 0 12px;
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
    }

    .action-list {
      display: grid;
      gap: 8px;
    }

    .action-btn {
      border: none;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease, background-color 0.15s ease;
      text-align: left;
    }

    .action-btn:hover {
      transform: translateY(-1px);
      opacity: 0.95;
    }

    .action-btn:active {
      transform: translateY(0);
    }

    .danger-btn {
      background: #fff5f5;
      color: #c53030;
      border: 1px solid #fed7d7;
    }

    .danger-btn:hover {
      background: #fed7d7;
    }

    .danger-strong-btn {
      background: #fee2e2;
      color: #9b1c1c;
      border: 1px solid #fca5a5;
    }

    .danger-strong-btn:hover {
      background: #fecaca;
    }

    .action-note {
      margin: 8px 0 0;
      font-size: 11px;
      line-height: 1.5;
      color: #64748b;
    }

    /* モダンなスイッチUI */
    .switch {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 22px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #cbd5e1;
      transition: .3s;
      border-radius: 34px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .3s;
      border-radius: 50%;
    }

    input:checked+.slider {
      background-color: var(--primary);
    }

    input:checked+.slider:before {
      transform: translateX(18px);
    }

    .footer {
      margin-top: 20px;
      display: flex;
      justify-content: flex-end;
    }

    .save-btn {
      background-color: var(--primary);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .save-btn:hover {
      opacity: 0.9;
    }

    .version {
      font-size: 10px;
      color: #94a3b8;
      text-align: center;
      margin-top: 15px;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.45);
      z-index: 50;
    }

    .modal {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      z-index: 60;
      padding: 12px;
    }

    .modal[hidden],
    .modal-backdrop[hidden] {
      display: none;
    }

    .modal-card {
      width: min(90%, 360px);
      max-height: calc(100vh - 24px);
      overflow: auto;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 24px 80px rgba(15, 23, 42, 0.28);
      border: 1px solid rgba(148, 163, 184, 0.25);
      padding: 20px;
    }

    .modal-title {
      margin: 0 0 10px;
      font-size: 16px;
      line-height: 1.4;
    }

    .modal-message {
      margin: 0;
      font-size: 13px;
      line-height: 1.7;
      color: #475569;
      white-space: pre-wrap;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 18px;
    }

    .modal-btn {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    .modal-btn-secondary {
      background: #e2e8f0;
      color: #334155;
    }

    .modal-btn-primary {
      background: #dc2626;
      color: #fff;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%);
      z-index: 70;
      background: #1e293b;
      color: #fff;
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 12px;
      box-shadow: 0 12px 32px rgba(15, 23, 42, 0.25);
    }
  </style>
</head>

<body>
  <section id="updateBanner" class="update-banner" aria-live="polite" hidden>
    <div class="update-banner__header">
      <div class="update-banner__icon">!</div>
      <div class="update-banner__body">
        <h2 id="updateBannerTitle" class="update-banner__title"></h2>
        <p id="updateBannerMessage" class="update-banner__message"></p>
        <div class="update-banner__actions">
          <button id="updateBannerOpen" type="button" class="update-banner__button update-banner__button--primary">今すぐ更新</button>
          <button id="updateBannerLater" type="button" class="update-banner__button update-banner__button--secondary">後で</button>
        </div>
      </div>
    </div>
  </section>

  <div class="header">
    <span class="header-icon">🛡️</span>
    <h1>UNIPA Guardian</h1>
  </div>

  <div class="card">
    <div class="section-title">設定</div>
    <div class="setting-item">
      <label class="setting-label" for="showStatus">セッションモニターを表示</label>
      <label class="switch">
        <input type="checkbox" id="showStatus">
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="card">
    <div class="section-title">セッションモニターのデザイン</div>
    <div class="setting-item setting-item--stacked">
      <div>
        <div class="setting-label">プリセット</div>
        <p class="setting-help">見た目の雰囲気をすばやく切り替えられます。</p>
      </div>
      <div class="preset-grid" id="presetGrid">
        <button type="button" class="preset-btn" data-preset="classic">Classic</button>
        <button type="button" class="preset-btn" data-preset="glass">Glass</button>
        <button type="button" class="preset-btn" data-preset="compact">Compact</button>
        <button type="button" class="preset-btn" data-preset="alert">Alert</button>
      </div>
    </div>

    <div class="setting-item setting-item--stacked mt-14">
      <div>
        <div class="setting-label">カスタム設定</div>
        <p class="setting-help">色、角丸、位置、透明度などを個別に調整できます。</p>
      </div>
      <div class="customize-grid">
        <div class="field">
          <label for="monitorTheme">テーマ</label>
          <select id="monitorTheme">
            <option value="classic">Classic</option>
            <option value="glass">Glass</option>
            <option value="compact">Compact</option>
            <option value="alert">Alert</option>
          </select>
        </div>
        <div class="field">
          <label for="monitorPosition">表示位置</label>
          <select id="monitorPosition">
            <option value="bottom-right">右下</option>
            <option value="bottom-left">左下</option>
            <option value="top-right">右上</option>
            <option value="top-left">左上</option>
          </select>
        </div>

        <div class="field">
          <label for="monitorScale">サイズ</label>
          <div class="field-inline">
            <input type="range" id="monitorScale" min="0.8" max="1.5" step="0.05" value="1">
            <span class="field-value" id="monitorScaleValue">1.00x</span>
          </div>
        </div>
        <div class="field">
          <label for="monitorOpacity">透明度</label>
          <div class="field-inline">
            <input type="range" id="monitorOpacity" min="0.35" max="1" step="0.05" value="0.9">
            <span class="field-value" id="monitorOpacityValue">90%</span>
          </div>
        </div>

        <div class="field">
          <label for="monitorRadius">角丸</label>
          <div class="field-inline">
            <input type="range" id="monitorRadius" min="0" max="24" step="1" value="10">
            <span class="field-value" id="monitorRadiusValue">10px</span>
          </div>
        </div>
        <div class="field">
          <label for="monitorBorderWidth">枠線</label>
          <div class="field-inline">
            <input type="range" id="monitorBorderWidth" min="0" max="4" step="1" value="1">
            <span class="field-value" id="monitorBorderWidthValue">1px</span>
          </div>
        </div>

        <div class="field">
          <label for="monitorBgColor">背景色</label>
          <input type="color" id="monitorBgColor" value="#1a202c">
        </div>
        <div class="field">
          <label for="monitorTextColor">文字色</label>
          <input type="color" id="monitorTextColor" value="#4fd1c5">
        </div>

        <div class="field">
          <label for="monitorBorderColor">枠線色</label>
          <input type="color" id="monitorBorderColor" value="#2d3748">
        </div>
        <div class="field">
          <label for="monitorShadow">影の強さ</label>
          <div class="field-inline">
            <input type="range" id="monitorShadow" min="0" max="60" step="2" value="32">
            <span class="field-value" id="monitorShadowValue">32</span>
          </div>
        </div>

        <div class="field span-2">
          <label for="monitorCorner">表示の雰囲気</label>
          <select id="monitorCorner">
            <option value="session">セッション表示</option>
            <option value="alert">アラート強調</option>
            <option value="minimal">最小構成</option>
          </select>
        </div>
      </div>

      <div class="preview-wrap">
        <div class="setting-label">プレビュー</div>
        <div class="preview-box" id="monitorPreviewBox">
          <div class="preview-monitor" id="monitorPreview">
            <span class="preview-label">UNIPA SESSION</span>
            <span class="preview-time">⏳ 15:00</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="section-title">バックアップデータ削除</div>
    <div class="action-list">
      <button id="deleteTextBackups" class="action-btn danger-btn">📝 バックアップ済みのテキストデータを削除</button>
      <button id="deleteFileBackups" class="action-btn danger-btn">📎 バックアップ済みのファイルデータを削除</button>
      <button id="deleteAllBackups" class="action-btn danger-strong-btn">🧹 バックアップ済みの全データを削除</button>
    </div>
    <p class="action-note">
      ここで削除できるのは、拡張機能が保存したローカルバックアップです。UNIPA 本体のデータは削除されません。
    </p>
  </div>

  <div class="footer">
    <button id="save" class="save-btn">設定を保存</button>
  </div>

  <div class="version" id="versionLabel"></div>

  <div id="modalBackdrop" class="modal-backdrop" hidden></div>
  <div id="modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" hidden>
    <div class="modal-card">
      <h2 id="modalTitle" class="modal-title"></h2>
      <p id="modalMessage" class="modal-message"></p>
      <div class="modal-actions">
        <button id="modalCancel" type="button" class="modal-btn modal-btn-secondary">キャンセル</button>
        <button id="modalConfirm" type="button" class="modal-btn modal-btn-primary">OK</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast" hidden></div>

  <script src="options.js"></script>
</body>

</html>
